name: PyPI 다운로드 텔레그램 리포트

# 매일 09:00 KST (00:00 UTC) 에 pypistats 집계를 텔레그램으로 전송.
# 사전 설정 (repo Settings → Secrets and variables → Actions):
#   TELEGRAM_BOT_TOKEN  — @BotFather 로 만든 봇 토큰
#   TELEGRAM_CHAT_ID    — 받을 채팅 ID
# 수동 실행: Actions 탭 → 이 워크플로 → Run workflow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch stats and send to Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          PKG: tossinvest-cli
        run: |
          if [ -z "$BOT_TOKEN" ] || [ -z "$CHAT_ID" ]; then
            echo "TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID 시크릿이 없어 건너뜁니다."
            exit 0
          fi

          recent=$(curl -sf "https://pypistats.org/api/packages/$PKG/recent" || echo "")
          if [ -z "$recent" ]; then
            text="📦 $PKG — pypistats 집계가 아직 없습니다 (신규 패키지는 1~2일 지연)."
          else
            day=$(echo "$recent"   | jq -r '.data.last_day')
            week=$(echo "$recent"  | jq -r '.data.last_week')
            month=$(echo "$recent" | jq -r '.data.last_month')
            version=$(curl -sf "https://pypi.org/pypi/$PKG/json" | jq -r '.info.version')
            stars=$(curl -sf "https://api.github.com/repos/rescenedev/$PKG" | jq -r '.stargazers_count // "-"')
            text="📦 *$PKG* v$version
어제: *${day}* 회 · 7일: *${week}* 회 · 30일: *${month}* 회
⭐ GitHub stars: ${stars}
https://pypistats.org/packages/$PKG"
          fi

          curl -sf "https://api.telegram.org/bot$BOT_TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d parse_mode="Markdown" \
            --data-urlencode text="$text" > /dev/null
          echo "전송 완료"

